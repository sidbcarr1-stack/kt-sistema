<div id="view-relatorio" class="bg-white p-4 md:p-6 rounded-xl shadow-lg">
    <div class="bg-gray-50 p-4 rounded-lg mb-4 border">
        <h3 class="text-sm font-bold text-gray-700 mb-3">🔍 Filtros do Relatório</h3>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-3 mb-3">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Campo 1</label>
                <select id="filtro_campo1" onchange="configurarFiltroData(1)" class="w-full border p-2 rounded text-sm">
                    <option value="">Selecione...</option>
                    <option value="K">DATA DO SERVIÇO (K)</option>
                    <option value="B">INSTITUIÇÃO (B)</option>
                    <option value="N">MOTORISTA (N)</option>
                    <option value="J">Nº DO PROTOCOLO (J)</option>
                    <option value="P">PLACA DO VEÍCULO (P)</option>
                    <option value="AY">Nº DA NF/RECIBO (AY)</option>
                </select>
            </div>
            <div id="filtro1_texto">
                <label class="block text-xs font-bold text-gray-600 mb-1">Valor</label>
                <select id="filtro_valor1" class="w-full border p-2 rounded text-sm">
                    <option value="">Selecione...</option>
                </select>
            </div>
            <div id="filtro1_data_inicio" class="hidden">
                <label class="block text-xs font-bold text-gray-600 mb-1">Data Início</label>
                <input type="date" id="filtro_data1_inicio" class="w-full border p-2 rounded text-sm">
            </div>
            <div id="filtro1_data_fim" class="hidden">
                <label class="block text-xs font-bold text-gray-600 mb-1">Data Fim</label>
                <input type="date" id="filtro_data1_fim" class="w-full border p-2 rounded text-sm">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-5 gap-3 mb-3">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1">Campo 2</label>
                <select id="filtro_campo2" onchange="configurarFiltroData(2)" class="w-full border p-2 rounded text-sm">
                    <option value="">Selecione...</option>
                    <option value="K">DATA DO SERVIÇO (K)</option>
                    <option value="B">INSTITUIÇÃO (B)</option>
                    <option value="N">MOTORISTA (N)</option>
                    <option value="J">Nº DO PROTOCOLO (J)</option>
                    <option value="P">PLACA DO VEÍCULO (P)</option>
                    <option value="AY">Nº DA NF/RECIBO (AY)</option>
                </select>
            </div>
            <div id="filtro2_texto">
                <label class="block text-xs font-bold text-gray-600 mb-1">Valor</label>
                <select id="filtro_valor2" class="w-full border p-2 rounded text-sm">
                    <option value="">Selecione...</option>
                </select>
            </div>
            <div id="filtro2_data_inicio" class="hidden">
                <label class="block text-xs font-bold text-gray-600 mb-1">Data Início</label>
                <input type="date" id="filtro_data2_inicio" class="w-full border p-2 rounded text-sm">
            </div>
            <div id="filtro2_data_fim" class="hidden">
                <label class="block text-xs font-bold text-gray-600 mb-1">Data Fim</label>
                <input type="date" id="filtro_data2_fim" class="w-full border p-2 rounded text-sm">
            </div>
            <!-- Total dos valores -->
            <div id="total-valores-relatorio" class="hidden flex items-end">
                <div class="w-full p-2 bg-blue-50 border border-blue-200 rounded-lg text-right">
                    <span class="text-xs text-gray-600">Total: </span>
                    <span id="total-valores" class="text-sm font-bold text-blue-900">R$ 0,00</span>
                </div>
            </div>
        </div>

        <!-- Total dos valores -->
        <!--  <div id="total-valores-relatorio"
            class="mb-3 p-3 bg-blue-50 border border-blue-200 rounded-lg text-right hidden">
            <span class="text-sm text-gray-600">Total dos Valores: </span>
            <span id="total-valores" class="text-lg font-bold text-blue-900">R$ 0,00</span>
        </div> -->

        <div class="flex gap-2">
            <button type="button" onclick="carregarRelatorio()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium">🔍
                Filtrar</button>
            <button type="button" onclick="limparFiltrosRelatorio()"
                class="bg-gray-300 hover:bg-gray-400 text-gray-700 px-4 py-2 rounded text-sm font-medium">🗑️ Limpar
                Filtros</button>
            <button type="button" onclick="exportarPDF()"
                class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm font-medium">💾 Salvar
                PDF</button>
            <button type="button" onclick="imprimirPDF()"
                class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded text-sm font-medium ml-auto">🖨️
                Imprimir</button>
        </div>
    </div>

    <div class="table-scroll border rounded">
        <table class="min-w-full divide-y divide-gray-200 text-sm" id="tabela-relatorio">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase">Data do Serviço</th>
                    <th class="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase">Instituição</th>
                    <th class="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase">Nº Protocolo</th>
                    <th class="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase">Placa</th>
                    <th class="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase">Valor</th>
                    <th class="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase">Nº NF/Recibo</th>
                    <th class="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase">Data Receb.
                        Programada</th>
                    <th class="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase">Motorista</th>
                </tr>
            </thead>
            <tbody id="table-body-relatorio" class="bg-white divide-y divide-gray-100"></tbody>
        </table>
    </div>

    <p id="total-info-relatorio" class="mt-2 text-xs text-gray-500 text-center"></p>
