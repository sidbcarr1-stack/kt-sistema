{% extends "base.html" %}

{% block title %}NF/Recibo - KTSistema{% endblock %}

{% block body %}
<div id="view-nf-recibo" class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-6">
    <div class="max-w-7xl mx-auto">
        <!-- Navbar -->
        <div class="mb-6 flex justify-between items-center">
            <button onclick="window.location.href='/'"
                class="text-blue-600 hover:text-blue-800 font-bold flex items-center gap-2">
                ← Menu
            </button>
            <h1 class="text-2xl font-bold text-gray-800">📊 Relatório de Quantidade de Serviços e Totais por Instituição
            </h1>
            <div></div>
        </div>

        <!-- Formulário -->
        <div class="bg-white p-4 md:p-6 rounded-xl shadow-lg">
            <div class="bg-gray-50 p-4 rounded-lg mb-4 border">
                <h3 class="text-lg font-bold text-gray-700 mb-3">Filtros do Relatório</h3>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Instituição</label>
                        <select id="instituicao" class="w-full border p-2 rounded text-sm">
                            <option value="">Todas</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Data Inicial</label>
                        <input type="date" id="data-inicio" class="w-full border p-2 rounded text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-600 mb-1">Data Final</label>
                        <input type="date" id="data-final" class="w-full border p-2 rounded text-sm">
                    </div>
                </div>

                <div class="flex gap-2">
                    <button type="button" onclick="carregarRelatorio()"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium">🔍
                        Filtrar</button>
                    <button type="button" onclick="limparFiltros()"
                        class="bg-gray-300 hover:bg-gray-400 text-gray-700 px-4 py-2 rounded text-sm font-medium">🗑️
                        Limpar</button>
                    <button type="button" onclick="exportarPDF()"
                        class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded text-sm font-medium">📄
                        Exportar PDF</button>
                </div>
            </div>

            <div class="table-scroll border rounded">
                <table class="min-w-full divide-y divide-gray-200 text-sm" id="tabela-nf-recibo">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase">Instituição
                            </th>
                            <th class="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase">Qtde
                                Serviços</th>
                            <th class="px-3 py-2 text-center text-xs font-semibold text-gray-600 uppercase">Total</th>
                        </tr>
                    </thead>
                    <tbody id="table-body-nf-recibo" class="bg-white divide-y divide-gray-100"></tbody>
                    <tfoot class="bg-blue-50 font-bold">
                        <tr>
                            <td class="px-3 py-2 text-right text-sm">TOTAL GERAL →</td>
                            <td class="px-3 py-2 text-center text-sm text-blue-900" id="total-qtde">0</td>
                            <td class="px-3 py-2 text-center text-sm text-blue-900" id="total-valor">R$ 0,00</td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <p id="total-info" class="mt-2 text-xs text-gray-500 text-center"></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Inicializar quando a página carregar
    document.addEventListener('DOMContentLoaded', function () {
        carregarInstituicoes();
    });
</script>
{% endblock %}
