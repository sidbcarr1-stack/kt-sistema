<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Tipos de Serviços - KTSistema</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <!-- Header -->
    <header class="bg-blue-900 text-white shadow-lg">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <a href="{{ url_for('index') }}" class="hover:text-blue-200">← Menu</a>
                <h1 class="text-2xl font-bold">Cadastro de Tipos de Serviços</h1>
            </div>
            <button onclick="toggleView()" id="btn-toggle-view" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded">
                📋 Ver Lista de Tipos de Serviços
            </button>
        </div>
    </header>

    <!-- Formulário -->
    <div id="view-form" class="container mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold mb-4 text-gray-700">Dados do Tipo de Serviço</h2>

            <form id="form-servico" class="space-y-4">
                <input type="hidden" id="servico-id">

                <!-- Linha 1: ID + SERVIÇO -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">ID</label>
                        <input type="text" id="id_servico_display"
                            class="w-full border border-gray-300 rounded px-3 py-2 bg-gray-100 text-gray-600 cursor-not-allowed font-bold"
                            readonly value="Carregando..." title="ID gerado automaticamente">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">TIPO DE SERVIÇO *</label>
                        <input type="text" id="servico"
                            class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase"
                            required>
                    </div>
                </div>

                <!-- Botões -->
                <div class="flex justify-end space-x-3 pt-4 border-t">
                    <button type="button" onclick="limparFormulario()"
                        class="px-4 py-2 bg-gray-300 hover:bg-gray-400 text-gray-700 rounded">
                        Limpar
                    </button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded">
                        💾 Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Lista -->
    <div id="view-list" class="container mx-auto px-4 py-8 hidden">
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold mb-4 text-gray-700">Tipos de Serviços Cadastrados</h2>

            <div class="overflow-x-auto">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="border border-gray-300 px-3 py-2 text-left">ID</th>
                            <th class="border border-gray-300 px-3 py-2 text-left">Serviço</th>
                            <th class="border border-gray-300 px-3 py-2 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-servicos">
                        <!-- Preenchido via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal de Exclusão -->
    <div id="modal-delete" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-sm w-full mx-4">
            <h3 class="text-lg font-bold mb-3 text-center">Confirmar exclusão</h3>
            <p class="text-gray-600 mb-4 text-center">Deseja realmente excluir o serviço tipo de serviço<strong
                    id="delete-id-display"></strong>?</p>
            <div class="flex justify-end gap-2">
                <button type="button" onclick="fecharModal()"
                    class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">Cancelar</button>
                <button type="button" onclick="confirmarExclusao()"
                    class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded">Excluir</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/cad_servicos.js') }}"></script>
</body>

</html>
