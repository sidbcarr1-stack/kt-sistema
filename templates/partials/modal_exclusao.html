<div id="modal-delete" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 max-w-sm w-full mx-4">
        <h3 class="text-lg font-bold mb-3 text-center">Confirmar exclusão</h3>
        <p class="text-gray-600 mb-4 text-center">Deseja realmente excluir o registro <strong
                id="delete-id-display"></strong>?</p>
        <input type="hidden" id="delete-id-input">
        <p class="text-xs text-red-500 mb-4 text-center">
            ⚠️ Esta ação removerá permanentemente a linha da planilha.<br>
            Esta ação não pode ser desfeita!
        </p>
        <div class="flex justify-end gap-2">
            <button type="button" onclick="fecharModal()"
                class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">Cancelar</button>
            <button type="button" onclick="confirmarExclusao()"
                class="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded">Excluir</button>
        </div>
    </div>
</div>
