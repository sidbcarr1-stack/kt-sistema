<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Recuperar Senha - KTSistema</title>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">🔐 Recuperar Senha</h1>
            <p class="text-gray-600">Digite seu email para receber instruções</p>
        </div>

        <form id="form-recuperar" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Email Cadastrado</label>
                <input type="email" id="email" required
                    class="w-full border-2 border-gray-300 rounded-lg p-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                    placeholder="seu@email.com">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors">
                Enviar Instruções
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/login" class="text-blue-600 hover:text-blue-800 font-bold text-sm">
                ← Voltar para Login
            </a>
        </div>

        <div id="mensagem" class="hidden mt-4 p-3 rounded-lg text-sm"></div>
    </div>


    <script>
        document.getElementById('form-recuperar').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const mensagem = document.getElementById('mensagem');

            try {
                const response = await fetch('/recuperar-senha', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const result = await response.json();

                if (result.success) {
                    mensagem.className = 'mt-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm';
                    mensagem.textContent = result.message;
                } else {
                    mensagem.className = 'mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm';
                    mensagem.textContent = result.error;
                }
                mensagem.classList.remove('hidden');
            } catch (err) {
                mensagem.className = 'mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm';
                mensagem.textContent = 'Erro de conexão. Tente novamente.';
                mensagem.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
