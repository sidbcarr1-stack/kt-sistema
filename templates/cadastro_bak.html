<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cadastro - KTSistema</title>
</head>

<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">🚛 KTSistema</h1>
            <p class="text-gray-600">Cadastro de Novo Usuário</p>
        </div>

        <form id="form-cadastro" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Nome Completo</label>
                <input type="text" id="nome" required
                    class="w-full border-2 border-gray-300 rounded-lg p-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                    placeholder="Seu nome completo">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Email (Gmail)</label>
                <input type="email" id="email" required
                    class="w-full border-2 border-gray-300 rounded-lg p-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-200"
                    placeholder="seu@gmail.com">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Tipo de Usuário</label>
                <select id="tipo"
                    class="w-full border-2 border-gray-300 rounded-lg p-3 focus:border-blue-500 focus:ring-2 focus:ring-blue-200">
                    <option value="user">Usuário Comum</option>
                    <option value="admin">Administrador</option>
                </select>
            </div>

            <button type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-colors">
                Solicitar Cadastro
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-gray-600 text-sm">Já tem cadastro?</p>
            <a href="/login" class="text-blue-600 hover:text-blue-800 font-bold">Faça login aqui</a>
        </div>

        <div id="mensagem" class="hidden mt-4 p-3 rounded-lg text-sm"></div>
    </div>

    <script>
        document.getElementById('form-cadastro').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const tipo = document.getElementById('tipo').value;
            const mensagem = document.getElementById('mensagem');

            try {
                const response = await fetch('/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, tipo })
                });

                const result = await response.json();

                if (result.success) {
                    mensagem.className = 'mt-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded-lg text-sm';
                    mensagem.textContent = result.message;
                    mensagem.classList.remove('hidden');

                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 3000);
                } else {
                    mensagem.className = 'mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm';
                    mensagem.textContent = result.error;
                    mensagem.classList.remove('hidden');
                }
            } catch (err) {
                mensagem.className = 'mt-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm';
                mensagem.textContent = 'Erro de conexão. Tente novamente.';
                mensagem.classList.remove('hidden');
            }
        });
    </script>
</body>

</html>
